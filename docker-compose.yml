version: '3.8'

services:
  kdb-manager:
    image: gridone.net/kdb-manager:2.1.1
    container_name: kdb-manager-container
    #ports:
    #  - 28101:28101
    working_dir: /app    
    volumes:
      - ./.env:/app/.env:Z
      - ./models:/app/models:Z
      - ./logs:/app/logs:Z
    restart: unless-stopped
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              count: all # "all" 대신 특정 개수(예: 1)를 지정할 수도 있습니다.
    command: "uvicorn kdb_manager:app --port 28101 --host 0.0.0.0 --env-file .env"
